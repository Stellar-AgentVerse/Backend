# openspec/config.yaml
# SDD configuration — generated by sdd-init on 2026-06-13
schema: spec-driven

context: |
  Tech stack: NestJS 11 + TypeScript 5.7 / Node.js (ES2023) / Express / @stellar/stellar-sdk 14
  Architecture: Modular NestJS with Payments + Tokens modules; adapter pattern for payment gateways (Stripe, PayPal, Mock); Soroban contract integration via @stellar/stellar-sdk; config module with env validation and CORS/helmet setup; global API prefix /api
  Testing: Jest 30 with ts-jest; unit via *.spec.ts; E2E via test/jest-e2e.json + supertest; coverage via jest --coverage
  Style: ESLint 9 (typescript-eslint + prettier plugin); Prettier 3 (single quotes, trailing commas); TypeScript strictNullChecks only (noImplicitAny off)
  Repo: github.com/Stellar-AgentVerse/Backend
  Convention: No AGENTS.md or CLAUDE.md in project root; .env.example in Spanish for config comments
  Existing tests: None (zero spec files found)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Describe impact on both Payments and Tokens modules when cross-cutting
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Reference Solidity/Soroban patterns where relevant
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing NestJS module conventions (providers/exports/imports)
    - Follow adapter pattern for new payment providers
    tdd: true
    test_command: "npm test"
  verify:
    test_command: "npm test"
    test_e2e_command: "npm run test:e2e"
    build_command: "npm run build"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas
    - Update main specs when deltas are merged

testing:
  strict_tdd: true
  detected: "2026-06-13"
  runner:
    command: "npm test"
    framework: "jest"
    version: "30"
  layers:
    unit:
      available: true
      pattern: "**/*.spec.ts"
      command: "npm test"
    integration:
      available: false
      tool: ""
      command: ""
    e2e:
      available: true
      tool: "supertest + jest"
      command: "npm run test:e2e"
      config: "test/jest-e2e.json"
  coverage:
    available: true
    command: "npm run test:cov"
    collect_from: "src/**/*.(t|j)s"
    output: "coverage/"
  quality:
    linter:
      available: true
      command: "npm run lint"
      tool: "ESLint 9 + typescript-eslint"
    type_checker:
      available: true
      command: "npx tsc --noEmit"
      tool: "TypeScript 5.7"
      strict_mode: false
      notes: "strictNullChecks enabled; noImplicitAny off"
    formatter:
      available: true
      command: "npm run format"
      tool: "Prettier 3"
